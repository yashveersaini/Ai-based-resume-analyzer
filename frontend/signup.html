<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — ResumeIQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #e0e6ed;
    }
    
    .auth-container {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      max-width: 440px;
      width: 100%;
      padding: 48px 40px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);

      display: flex;
      flex-direction: column;
      align-items: center;   
    }

    
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #00c6ff, #4db8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .logo p {
      color: #aab6c4;
      font-size: 14px;
      margin-top: 8px;
    }
    
    .back-link {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .back-link a {
      color: #4db8ff;
      text-decoration: none;
      font-size: 14px;
    }
    
    .back-link a:hover {
      text-decoration: underline;
    }

    .error-box {
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255, 77, 77, 0.3);
      color: #ff6b6b;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .error-box.visible {
      display: block;
    }

    #clerk-sign-up {
      display: flex;
      justify-content: center;
    }
  </style>
</head>

<body>
  
  <div class="auth-container">
    <div class="back-link">
      <a href="/">← Back to Home</a>
    </div>
    
    <div class="logo">
      <h1>ResumeIQ</h1>
      <p>Create your account</p>
    </div>

    <div class="error-box" id="errorBox"></div>
    <div id="clerk-sign-up"></div>
  </div>

  <script src="/static/js/clerk-auth.js"></script>
  <script>
    const errorBox = document.getElementById('errorBox');

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add('visible');
    }

    window.addEventListener('load', async () => {
      try {
        const clerk = await initClerk();

        if (clerk.isSignedIn) {
          await syncBackendSession();
          window.location.href = '/dashboard';
          return;
        }

        clerk.mountSignUp(document.getElementById('clerk-sign-up'), {
          signInUrl: '/login',
          forceRedirectUrl: '/dashboard',
          fallbackRedirectUrl: '/dashboard',
        });
      } catch (error) {
        showError('Unable to load sign up. Check Clerk configuration.');
      }
    });
  </script>
  
</body>
</html>
